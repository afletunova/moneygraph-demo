name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -q

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

  db-migration-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aigraph
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aigraph"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema + seed against a fresh Postgres
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d aigraph -v ON_ERROR_STOP=1 -f db/init/001_schema.sql
          psql -h localhost -U postgres -d aigraph -v ON_ERROR_STOP=1 -f db/init/002_seed.sql

      - name: Sanity check — seed actually landed
        env:
          PGPASSWORD: postgres
        run: |
          count=$(psql -h localhost -U postgres -d aigraph -t -A -c "SELECT COUNT(*) FROM nodes;")
          echo "nodes: $count"
          test "$count" -gt 0
